version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "9000:9000"
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Preserve node_modules inside container

  backend:
    image: php:8.2-apache
    container_name: backend
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html