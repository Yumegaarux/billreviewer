version: "3.8"

services:
  db: 
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD} 
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_HOST: "%"    
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql

  frontend:
    build:
      context: ./frontend
    ports:
      - "9000:9000"
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Preserve node_modules inside container

  backend:
    build:
      context: ./backend # <-- points to the address of its dockerfile
    image: php:8.2-apache
    container_name: backend
    depends_on:
      - db
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: root
      DB_PASS: ${DB_PASSWORD} 
volumes:
  db_data: